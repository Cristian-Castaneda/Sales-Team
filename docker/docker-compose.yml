services:
  openclaw:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    user: "0:0"
    # Secrets injected by Doppler: `doppler run -- docker compose up -d`
    # Empty values (VAR_NAME:) mean "inherit from the process environment that doppler run populated".
    environment:
      ANTHROPIC_API_KEY:
      OPENROUTER_API_KEY:
      OPENCLAW_GATEWAY_TOKEN:
      TELEGRAM_BOT_TOKEN:
      GITHUB_REPO_SSH:
    volumes:
      - /root/.openclaw:/root/.openclaw
      - /root/.openclaw:/home/node/.openclaw
    ports:
      - "127.0.0.1:18789:18789"
      - "127.0.0.1:18790:18790"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      - browser

  browser:
    image: ghcr.io/browserless/chromium:latest
    restart: unless-stopped
    shm_size: "1gb"
    ports:
      - "127.0.0.1:3000:3000"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
