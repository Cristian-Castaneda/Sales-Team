services:
  openclaw:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    user: "0:0"
    env_file:
      - .env
    volumes:
      - /root/.openclaw:/root/.openclaw
      - /root/.openclaw:/home/node/.openclaw
    ports:
      - "127.0.0.1:18789:18789"
      - "127.0.0.1:18790:18790"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      - browser

  browser:
    image: ghcr.io/browserless/chromium:latest
    restart: unless-stopped
    shm_size: "1gb"
    ports:
      - "127.0.0.1:3000:3000"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  n8n:
    image: n8nio/n8n:latest
    ports:
      - "127.0.0.1:5678:5678"
    env_file:
      - .env
    environment:
      - N8N_HOST=n8n.expense-360.com
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://n8n.expense-360.com/
      - GENERIC_TIMEZONE=America/Santiago
      - TWENTY_API_KEY=${TWENTY_API_KEY}
    volumes:
      - ./n8n-data:/home/node/.n8n
    restart: always
